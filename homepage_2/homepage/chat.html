<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTICOM - Messages</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .chat-layout { display: flex; height: calc(100vh - 80px); max-width: 1100px; margin: 0 auto; padding: 1.5rem; gap: 1.2rem; }
        .chat-sidebar { width: 280px; flex-shrink: 0; background: #3a3535; border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 1rem 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .sidebar-title { font-size: 1rem; font-weight: 700; color: #e3bfdb; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.8rem; }
        .sidebar-search { width: 100%; padding: 8px 12px; background: #272222; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; font-size: 13px; font-family: inherit; outline: none; box-sizing: border-box; }
        .sidebar-search::placeholder { color: rgba(255,255,255,0.35); }
        .contact-list { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
        .contact-item { display: flex; align-items: center; gap: 10px; padding: 10px 1.2rem; cursor: pointer; transition: background 0.15s; border-left: 3px solid transparent; }
        .contact-item:hover { background: rgba(255,255,255,0.05); }
        .contact-item.active { background: rgba(110,48,120,0.3); border-left-color: #e3bfdb; }
        .contact-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .contact-info { flex: 1; overflow: hidden; }
        .contact-name { font-size: 13px; font-weight: 600; color: white; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .contact-preview { font-size: 11px; color: rgba(255,255,255,0.4); margin: 2px 0 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-area { flex: 1; background: #3a3535; border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { padding: 1rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .chat-header-left { display: flex; align-items: center; gap: 12px; }
        .chat-header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .chat-contact-name { font-size: 15px; font-weight: 700; color: white; margin: 0; }
        .chat-contact-status { font-size: 12px; color: #4caf50; margin: 2px 0 0; }
        .commission-btn { background: #6e3078; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s; flex-shrink: 0; }
        .commission-btn:hover { background: #8b4ea6; transform: translateY(-1px); }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { max-width: 70%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
        .msg-bubble.received { background: #272222; color: rgba(255,255,255,0.85); border-bottom-left-radius: 4px; align-self: flex-start; }
        .msg-bubble.sent { background: #6e3078; color: white; border-bottom-right-radius: 4px; align-self: flex-end; }
        .msg-time { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 4px; display: block; }
        .msg-time.right { text-align: right; }
        .commission-card { align-self: flex-end; max-width: 80%; background: linear-gradient(135deg, #6e3078, #4a1a55); border-radius: 16px; border-bottom-right-radius: 4px; padding: 1rem 1.2rem; border: 1px solid rgba(227,191,219,0.3); }
        .commission-card.received-commission { align-self: flex-start; border-bottom-right-radius: 16px; border-bottom-left-radius: 4px; background: linear-gradient(135deg, #3a1a55, #2a0a3a); }
        .commission-card-label { font-size: 10px; font-weight: 700; color: #e3bfdb; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .commission-card-text { font-size: 13px; color: white; margin-bottom: 6px; line-height: 1.5; }
        .commission-card-deadline { font-size: 11px; color: rgba(255,255,255,0.6); }
        .commission-card-actions { display: flex; gap: 8px; margin-top: 10px; }
        .accept-btn { background: #4caf50; color: white; border: none; padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .decline-btn { background: transparent; color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.2); padding: 6px 16px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .accepted-badge { background: rgba(76,175,80,0.2); color: #4caf50; border: 1px solid rgba(76,175,80,0.3); padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-top: 8px; display: inline-block; }
        .chat-input-row { padding: 1rem 1.5rem; border-top: 1px solid rgba(255,255,255,0.06); display: flex; gap: 10px; align-items: center; }
        .chat-input { flex: 1; padding: 10px 16px; background: #272222; border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; color: white; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
        .chat-input::placeholder { color: rgba(255,255,255,0.35); }
        .chat-input:focus { border-color: #8b4ea6; }
        .send-btn { width: 42px; height: 42px; border-radius: 50%; background: #6e3078; color: white; border: none; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
        .send-btn:hover { background: #8b4ea6; }
        .no-chat { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; color: rgba(255,255,255,0.3); font-size: 14px; }
        .no-chat-icon { font-size: 3rem; }
        .no-contacts { padding: 2rem 1rem; text-align: center; color: rgba(255,255,255,0.3); font-size: 13px; }
        .commission-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; justify-content: center; align-items: center; }
        .commission-modal.show { display: flex; }
        .commission-modal-box { background: #3a3535; border-radius: 16px; padding: 2rem; max-width: 420px; width: 90%; border: 1px solid rgba(255,255,255,0.1); }
        .commission-modal-box h3 { font-size: 1rem; font-weight: 700; color: #e3bfdb; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1.2rem; }
        .commission-modal-box textarea, .commission-modal-box input[type="date"] { width: 100%; padding: 10px 14px; background: #272222; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: white; font-size: 14px; font-family: inherit; outline: none; box-sizing: border-box; margin-bottom: 1rem; }
        .commission-modal-box textarea { resize: vertical; min-height: 100px; }
        .commission-modal-box label { display: block; font-size: 12px; color: #e3bfdb; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
        .commission-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .commission-send-btn { background: #6e3078; color: white; border: none; padding: 10px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .commission-cancel-btn { background: transparent; color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.2); padding: 10px 24px; border-radius: 50px; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="main-header">
        <a href="javascript:history.back()" class="brand-container-link">
            <img src="homepage.png" alt="ARTICOM Logo" class="brand-logo">
            <h1 class="brand-name">ARTICOM</h1>
        </a>
        <div class="header-buttons">
            <div class="dropdown-container mail-container">
                <button class="header-btn mail-btn" title="Notifications">🔔</button>
                <div class="big-panel"><input type="text" placeholder="No new notifications.." class="msg-search"></div>
            </div>
            <div class="dropdown-container message-container">
                <button class="header-btn message-btn" title="Messages">💬</button>
                <div class="big-panel">
                    <input type="text" id="msgSearch" placeholder="Search messages..." class="msg-search">
                    <ul id="Messages"></ul>
                </div>
            </div>
            <div class="dropdown-container">
                <button class="header-btn user-btn" title="Profile">👤</button>
                <div class="dropdown-panel">
                    <div style="padding:16px;">
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
                            <img src="img.jpg" id="profileImage" style="width:48px;height:48px;border-radius:50%;object-fit:cover;">
                            <div>
                                <p style="font-weight:600;font-size:14px;margin:0;">My Account</p>
                                <p style="font-size:12px;opacity:0.6;margin:0;" id="userRole">User</p>
                            </div>
                        </div>
                        <button id="editProfileBtn" style="width:100%;padding:9px;background:#6e3078;color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer;margin-bottom:8px;">✏️ Edit Profile</button>
                        <button id="viewProfileBtn" style="width:100%;padding:9px;background:transparent;color:white;border:1px solid rgba(255,255,255,0.2);border-radius:8px;font-size:13px;cursor:pointer;">👁️ View Profile</button>
                    </div>
                </div>
            </div>
            <div class="dropdown-container">
                <button class="header-btn settings-btn" title="Settings">⚙️</button>
                <div class="dropdown-panel"><ul id="Settings"></ul></div>
            </div>
        </div>
    </nav>

    <div class="chat-layout">
        <div class="chat-sidebar">
            <div class="sidebar-header">
                <p class="sidebar-title">Messages</p>
                <input type="text" class="sidebar-search" id="sidebarSearch" placeholder="Search...">
            </div>
            <div class="contact-list" id="contactList">
                <div class="no-contacts">Loading contacts...</div>
            </div>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="no-chat">
                <div class="no-chat-icon">💬</div>
                <p>Select a conversation to start chatting</p>
            </div>
        </div>
    </div>

    <div class="commission-modal" id="commissionModal">
        <div class="commission-modal-box">
            <h3>🎨 Send Commission Request</h3>
            <label>What do you need?</label>
            <textarea id="commissionText" placeholder="Describe what you want the artist to create..."></textarea>
            <label>Deadline</label>
            <input type="date" id="commissionDeadline">
            <div class="commission-modal-actions">
                <button class="commission-cancel-btn" onclick="closeCommissionModal()">Cancel</button>
                <button class="commission-send-btn" onclick="sendCommissionRequest()">Send Request</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        var role        = localStorage.getItem('articom-role') || 'user';
        var currentUser = {};
        try { currentUser = JSON.parse(localStorage.getItem('articom-user') || '{}'); } catch(e) {}

        var contacts      = [];
        var activeContact = null;
        var ws            = null;

        var params   = new URLSearchParams(window.location.search);
        var withName = params.get('with');
        var withId   = params.get('id');

        document.getElementById('userRole').textContent = role === 'artist' ? 'Artist' : 'Client';
        document.getElementById('editProfileBtn').onclick = function() {
            window.location.href = role === 'artist' ? 'profile-edit.html' : 'client-profile-edit.html';
        };
        document.getElementById('viewProfileBtn').onclick = function() {
            window.location.href = role === 'artist' ? 'other-page2.html' : 'client-profile-view.html';
        };

        function nowTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function formatTime(raw) {
            try {
                var d = new Date(raw);
                if (!isNaN(d)) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } catch(e) {}
            return raw || '';
        }

        function removePlaceholder(md) {
            var ph = md.querySelector('.chat-placeholder');
            if (ph) ph.remove();
        }

        // ── WEBSOCKET ─────────────────────────────────────────
        function connectWS() {
            try {
                var wsUrl = window.location.hostname === 'localhost'
                    ? 'ws://localhost:3000'
                    : 'wss://' + window.location.host;
                ws = new WebSocket(wsUrl);

                ws.onopen = function() {
                    if (currentUser.id) {
                        ws.send(JSON.stringify({ type: 'register', user_id: currentUser.id }));
                    }
                };

                ws.onmessage = function(event) {
                    try {
                        var data = JSON.parse(event.data);
                        if (data.type === 'message' && activeContact && data.sender_id == activeContact.id) {
                            var md = document.getElementById('chatMessages');
                            if (!md) return;
                            removePlaceholder(md);
                            appendMessage({ type: 'text', text: data.message, sent: false, time: data.sent_at }, md);
                            md.scrollTop = md.scrollHeight;
                        }
                    } catch(e) {}
                };

                ws.onclose = function() { setTimeout(connectWS, 2000); };
                ws.onerror = function() { ws.close(); };
            } catch(e) {}
        }

        connectWS();

        // ── LOAD CONTACTS ─────────────────────────────────────
        fetch('/api/users')
          .then(function(r) { return r.json(); })
          .then(function(users) {
            contacts = users
              .filter(function(u) { return u.id != currentUser.id; })
              .map(function(u) {
                return { id: u.id, name: u.fullname, role: u.role, avatar: 'https://i.pravatar.cc/40?u=' + u.id };
              });

            renderContacts();

            if (withName || withId) {
                var target = contacts.find(function(c) {
                    return c.name === decodeURIComponent(withName || '') || String(c.id) === String(withId);
                });
                if (target) openChat(target);
            }
          })
          .catch(function() {
            document.getElementById('contactList').innerHTML = '<div class="no-contacts">Could not load contacts.</div>';
          });

        // ── RENDER CONTACTS ───────────────────────────────────
        function renderContacts(filter) {
            filter = (filter || '').toLowerCase();
            var list = document.getElementById('contactList');
            list.innerHTML = '';

            var filtered = contacts.filter(function(c) { return c.name.toLowerCase().includes(filter); });

            if (!filtered.length) { list.innerHTML = '<div class="no-contacts">No contacts found.</div>'; return; }

            filtered.forEach(function(contact) {
                var item = document.createElement('div');
                item.className = 'contact-item' + (activeContact && activeContact.id === contact.id ? ' active' : '');
                item.innerHTML =
                    '<img src="' + contact.avatar + '" class="contact-avatar" alt="' + contact.name + '">' +
                    '<div class="contact-info">' +
                        '<p class="contact-name">' + contact.name + '</p>' +
                        '<p class="contact-preview">' + (contact.role || '') + '</p>' +
                    '</div>';
                item.addEventListener('click', function() { openChat(contact); });
                list.appendChild(item);
            });
        }

        // ── OPEN CHAT ─────────────────────────────────────────
        function openChat(contact) {
            activeContact = contact;
            renderContacts(document.getElementById('sidebarSearch').value);

            var actionBtn = role === 'user'
                ? '<button class="commission-btn" onclick="openCommissionModal()">🎨 Commission Request</button>'
                : '<button class="commission-btn" onclick="window.location.href=\'transaction.html\'">💳 Transaction</button>';

            document.getElementById('chatArea').innerHTML =
                '<div class="chat-header">' +
                    '<div class="chat-header-left">' +
                        '<img src="' + contact.avatar + '" alt="' + contact.name + '">' +
                        '<div>' +
                            '<p class="chat-contact-name">' + contact.name + '</p>' +
                            '<p class="chat-contact-status">🟢 Online</p>' +
                        '</div>' +
                    '</div>' +
                    actionBtn +
                '</div>' +
                '<div class="chat-messages" id="chatMessages">' +
                    '<div class="chat-placeholder" style="text-align:center;color:rgba(255,255,255,0.3);font-size:13px;padding:2rem;">Loading...</div>' +
                '</div>' +
                '<div class="chat-input-row">' +
                    '<input type="text" class="chat-input" id="chatInput" placeholder="Type a message...">' +
                    '<button class="send-btn" id="sendBtn">➤</button>' +
                '</div>';

            var md = document.getElementById('chatMessages');

            fetch('/api/messages?me=' + currentUser.id + '&other=' + contact.id)
              .then(function(r) { return r.json(); })
              .then(function(msgs) {
                md.innerHTML = '';
                if (!msgs.length) {
                    md.innerHTML = '<div class="chat-placeholder" style="text-align:center;color:rgba(255,255,255,0.3);font-size:13px;padding:2rem;">Start the conversation! 👋</div>';
                } else {
                    msgs.forEach(function(m) {
                        appendMessage({
                            type: 'text',
                            text: m.message,
                            sent: m.sender_id == currentUser.id,
                            time: formatTime(m.sent_at)
                        }, md);
                    });
                    md.scrollTop = md.scrollHeight;
                }
              });

            setTimeout(function() { var i = document.getElementById('chatInput'); if(i) i.focus(); }, 100);

            document.getElementById('sendBtn').addEventListener('click', sendMessage);
            document.getElementById('chatInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') sendMessage(); });

            function sendMessage() {
                var input = document.getElementById('chatInput');
                var text  = input.value.trim();
                if (!text) return;

                var now = nowTime();

                fetch('/api/message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sender_id: currentUser.id, receiver_id: contact.id, message: text })
                });

                if (ws && ws.readyState === 1) {
                    ws.send(JSON.stringify({
                        type: 'message',
                        sender_id:   currentUser.id,
                        receiver_id: contact.id,
                        message:     text,
                        sent_at:     now
                    }));
                }

                var chatMd = document.getElementById('chatMessages');
                removePlaceholder(chatMd);
                appendMessage({ type: 'text', text: text, sent: true, time: now }, chatMd);
                input.value = '';
                chatMd.scrollTop = chatMd.scrollHeight;
            }
        }

        // ── APPEND MESSAGE ────────────────────────────────────
        function appendMessage(msg, container) {
            var wrapper = document.createElement('div');
            wrapper.style.cssText = 'display:flex;flex-direction:column;align-items:' + (msg.sent ? 'flex-end' : 'flex-start') + ';';

            if (msg.type === 'commission') {
                var card = document.createElement('div');
                card.className = 'commission-card' + (msg.sent ? '' : ' received-commission');
                card.innerHTML =
                    '<div class="commission-card-label">🎨 Commission Request</div>' +
                    '<p class="commission-card-text">' + msg.text + '</p>' +
                    '<div class="commission-card-deadline">📅 Deadline: ' + (msg.deadline || 'TBD') + '</div>' +
                    (!msg.sent ? '<div class="commission-card-actions"><button class="accept-btn" onclick="acceptCommission(this)">Accept</button><button class="decline-btn">Decline</button></div>' : '');
                wrapper.appendChild(card);
            } else {
                wrapper.innerHTML =
                    '<div class="msg-bubble ' + (msg.sent ? 'sent' : 'received') + '">' + msg.text + '</div>' +
                    '<span class="msg-time ' + (msg.sent ? 'right' : '') + '">' + msg.time + '</span>';
            }
            container.appendChild(wrapper);
        }

        // ── COMMISSION MODAL ──────────────────────────────────
        function openCommissionModal()  { document.getElementById('commissionModal').classList.add('show'); }
        function closeCommissionModal() { document.getElementById('commissionModal').classList.remove('show'); }

        function sendCommissionRequest() {
            var text     = document.getElementById('commissionText').value.trim();
            var deadline = document.getElementById('commissionDeadline').value;
            if (!text)     { alert('Please describe what you need.'); return; }
            if (!deadline) { alert('Please set a deadline.'); return; }

            if (currentUser.id && activeContact) {
                fetch('/api/commission', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        client_id:   currentUser.id,
                        artist_id:   activeContact.id,
                        title:       'Commission Request',
                        description: text,
                        budget:      'Negotiable',
                        deadline:    deadline
                    })
                });
            }

            var md = document.getElementById('chatMessages');
            if (md) {
                removePlaceholder(md);
                appendMessage({ type: 'commission', text: text, deadline: deadline, sent: true, time: nowTime() }, md);
                md.scrollTop = md.scrollHeight;
            }

            document.getElementById('commissionText').value = '';
            document.getElementById('commissionDeadline').value = '';
            closeCommissionModal();
        }

        function acceptCommission(btn) { btn.parentElement.innerHTML = '<span class="accepted-badge">✅ Accepted</span>'; }

        document.getElementById('sidebarSearch').addEventListener('input', function() { renderContacts(this.value); });
    </script>
</body>
</html>
